name: Daily AI Report (GitHub Pages)

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-ai-report
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "Missing required secret: ANTHROPIC_API_KEY"
            exit 1
          fi

      - name: Run Newsloom pipeline (v2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          AI_PROTOCOL: ${{ secrets.AI_PROTOCOL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          NEWSLOOM_GLOBAL_TIMEOUT: "1800"
        run: |
          DATE=$(date -u +%F)
          echo "DATE=$DATE"
          python run_v2.py --config config/config.pages.yaml --date "$DATE"

      - name: Publish to docs/daily (GitHub Pages)
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)

          mkdir -p docs/daily/$DATE

          # latest
          cp -f reports/$DATE/report.html docs/daily/index.html
          cp -f reports/$DATE/report.html docs/daily/$DATE/index.html

          # optional markdown archive
          if [ -f reports/$DATE/report.md ]; then
            cp -f reports/$DATE/report.md docs/daily/latest.md
            cp -f reports/$DATE/report.md docs/daily/$DATE/report.md
          fi

          # RSS
          if [ -f reports/feed.xml ]; then
            cp -f reports/feed.xml docs/daily/feed.xml
          fi

          # Disable Jekyll (serve raw html)
          touch docs/.nojekyll

          # Simple landing index (keep it stable)
          if [ ! -f docs/daily/README.md ]; then
            cat > docs/daily/README.md <<'EOF'
# Newsloom Daily Report

- Latest: ./index.html
- RSS: ./feed.xml

(Generated by GitHub Actions)
EOF
          fi

      - name: Commit & push
        run: |
          set -e
          git config user.name "newsloom-bot"
          git config user.email "newsloom-bot@users.noreply.github.com"

          git add docs/daily docs/.nojekyll data/state data/trend_history || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          DATE=$(date -u +%F)
          git commit -m "chore(daily): publish AI report ${DATE}"
          git push
